# PROD profile configuration
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.fitlog: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN